      letter-spacing: 0.18em;
      font-size: 12px;
      font-weight: 700;
      color: #c084fc;
      margin-bottom: 10px;
      text-align: center;
    }

    h1 {
      font-size: clamp(26px, 6vw, 40px);
      font-weight: 800;
      text-align: center;
      line-height: 1.12;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    h1 .gradient {
      background: linear-gradient(135deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: clamp(14px, 3.5vw, 17px);
      text-align: center;
      margin-bottom: 22px;
      font-weight: 400;
      min-height: 1.2em;
    }

    /* Video card — portrait 2:3 to match the runtime opening clips */
    .media {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 2 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      position: relative;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(192, 132, 252, 0.12);
    }
    .media video, .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .media .skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #2d1b4e 0%, #1a1a24 50%, #3b1538 100%);
    }

    .cta {
      display: block;
      width: 100%;
      max-width: 360px;
      text-align: center;
      padding: 16px 24px;
      border-radius: 14px;
      background: linear-gradient(135deg, #c084fc, #f472b6);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 8px 28px rgba(244, 114, 182, 0.28);
      -webkit-tap-highlight-color: transparent;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 34px rgba(244, 114, 182, 0.38); }
    .cta:active { transform: translateY(0); }
    .cta[aria-disabled="true"] { opacity: 0.5; pointer-events: none; }

    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(10, 10, 15, 0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a3a; border-top-color: #c084fc;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    footer { text-align: center; padding: 20px 16px; font-size: 12px; color: #94a3b8; }
    footer a { color: #94a3b8; text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: #c084fc; }
    .footer-links { display: flex; gap: 16px; justify-content: center; margin-bottom: 8px; }
  </style>

      window.__TRACK = {
        meta:   src === 'meta'   || !!p.get('fbclid'),
        tiktok: src === 'tiktok' || !!p.get('ttclid'),
      };
    })();
  </script>

<body>
  <!-- Top bar -->
  <div class="top-bar fade-in">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartGrad)"/>

        <linearGradient id="heartGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
          <stop stop-color="#c084fc"/>
          <stop offset="1" stop-color="#f472b6"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Main content -->
  <main class="fade-in">
    <p class="eyebrow">Your fantasy awaits</p>
    <h1 id="headline"><span class="gradient">Step into your fantasy</span></h1>
    <p class="subtitle" id="subtitle">She set the scene. Press play and make the first move.</p>

    <div class="media" id="media">
      <div class="skeleton" id="skeleton"></div>
      <video id="fantasy-video" playsinline muted loop autoplay preload="metadata" style="display:none"></video>
      <img id="fantasy-poster" alt="" style="display:none">
    </div>

    <a class="cta" id="cta" role="button" aria-disabled="true" tabindex="0">Try this Fantasy</a>
  </main>

  <!-- Loading overlay -->

  <!-- Footer -->
  <footer>
    <div class="footer-links">
      <a href="https://mydreamgirlfriend.ai/privacy">Privacy</a>
      <a href="https://mydreamgirlfriend.ai/terms">Terms</a>
    </div>
    <p>&copy; 2026 MyDreamGirlfriend.ai</p>
  </footer>

  <script>
    var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    var APP_BASE = isLocal ? 'http://localhost:3000' : 'https://mydreamgirlfriend.ai';

    // Fantasy slug from the path: lp3.mydreamgirlfriend.ai/<slug>
    var SLUG = decodeURIComponent((location.pathname || '').replace(/^\/+|\/+$/g, '').split('/')[0] || '');

    function getUrlParams() {
      var params = {};
      new URLSearchParams(window.location.search).forEach(function (value, key) { params[key] = value; });
      return params;
    }

    function setText(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }

    // Build the destination: the anonymous fantasy preview. The app's middleware
    // captures the forwarded utm params; the signup gate fires on first reply.
    function buildRedirectUrl() {
      var params = getUrlParams();
      params.lp = 'lp3';
      if (SLUG) params.utm_content = params.utm_content || SLUG;
      var qs = new URLSearchParams(params).toString();
      var path = SLUG ? '/preview/fantasy/' + encodeURIComponent(SLUG) : '/browse';
      return APP_BASE + path + (qs ? ('?' + qs) : '');
    }

    function renderFantasy(f) {
      document.getElementById('skeleton').style.display = 'none';

      if (f.title) {
        var h = document.getElementById('headline');
        h.innerHTML = '<span class="gradient"></span>';
        h.firstChild.textContent = f.title;
        document.title = f.title + ' — My Dream Girlfriend';
      }
      var who = f.girl_name ? (f.girl_name + ' is waiting.') : 'She set the scene.';
      setText('subtitle', who + ' Step in and make the first move.');

      var video = document.getElementById('fantasy-video');
      var poster = document.getElementById('fantasy-poster');
      if (f.video_url) {
        if (f.reference_image_url) video.poster = f.reference_image_url;
        video.src = f.video_url;
        video.style.display = 'block';
        video.play().catch(function () {});
      } else if (f.reference_image_url) {
        poster.src = f.reference_image_url;
        poster.alt = f.title || 'Fantasy';
        poster.style.display = 'block';
      } else {
        document.getElementById('skeleton').style.display = 'block';
      }
    }

    function enableCta() {
      var cta = document.getElementById('cta');
      cta.setAttribute('aria-disabled', 'false');
      cta.addEventListener('click', handleCta);
      cta.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCta(); }
      });
    }

    function handleCta() {
      document.getElementById('loadingOverlay').classList.add('active');

      var eventID = 'lead_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      var track = window.__TRACK || { meta: false, tiktok: false };

      // Meta Pixel + server CAPI (deduped via eventID) — Meta-sourced traffic only.
      if (track.meta) {
        if (typeof fbq === 'function') {
          fbq('track', 'Lead', { content_name: 'fantasy_intent', content_category: SLUG || 'fantasy', source: 'lp3' }, { eventID: eventID });
        }
        fetch('/api/meta/lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fantasy: SLUG, event_id: eventID, source_url: window.location.href }),
        }).catch(function () {});
      }

      // TikTok Pixel — TikTok-sourced traffic only.
      if (track.tiktok && typeof ttq !== 'undefined' && ttq.track) {
        ttq.track('ClickButton', { content_name: 'fantasy_intent', content_category: SLUG || 'fantasy', source: 'lp3' });
      }

      // PostHog — every visitor.
      if (typeof posthog !== 'undefined' && posthog.capture) {
        posthog.capture('lp_fantasy_cta_click', { fantasy: SLUG });
      }

      var redirectUrl = buildRedirectUrl();
      setTimeout(function () { window.location.href = redirectUrl; }, 300);
    }

    // Fetch the fantasy and wire everything up.
    (function init() {
      if (!SLUG) {
        // No slug — generic invite, CTA falls back to /browse.
        document.getElementById('skeleton').style.display = 'block';
        enableCta();
        return;
      }
      fetch(APP_BASE + '/api/fantasies/' + encodeURIComponent(SLUG))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (d && d.fantasy) renderFantasy(d.fantasy);
          else document.getElementById('skeleton').style.display = 'block';
          enableCta();
        })
        .catch(function () {
          document.getElementById('skeleton').style.display = 'block';
          enableCta();
        });
    })();
  </script>
