  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
    }

    .top-bar svg {
      width: 28px;
      height: 28px;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 32px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    h1 .gradient {
      background: linear-gradient(135deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: clamp(15px, 3.5vw, 18px);
      text-align: center;
      margin-bottom: 32px;
      font-weight: 400;
    }

    /* Cards container — always side by side */
    .cards {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 480px;
      justify-content: center;
    }

    /* Individual card */
    .card {
      flex: 1;
      max-width: 220px;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover, .card:focus-visible {
      transform: translateY(-4px);
      border-color: #c084fc;
      box-shadow: 0 8px 32px rgba(192, 132, 252, 0.15);
    }

    .card:active {
      transform: translateY(-2px);
    }

    .card:focus-visible {
      outline: 2px solid #c084fc;
      outline-offset: 2px;
    }

    /* Card image area — gradient placeholder with silhouette */
    .card-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-image.female {
      background: linear-gradient(160deg, #2d1b4e 0%, #1a1a24 50%, #3b1538 100%);
    }

    .card-image.male {
      background: linear-gradient(160deg, #1b2d4e 0%, #1a1a24 50%, #15383b 100%);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-label {
      padding: 18px 16px;
      text-align: center;
    }

    .card-label h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card-label p {
      font-size: 13px;
      color: #94a3b8;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a3a;
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fade in */
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px 16px;
      font-size: 12px;
      color: #94a3b8;
    }

    footer a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover {
      color: #c084fc;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 8px;
    }
  </style>
</head>

        <div class="card-image female">
          <img src="https://r2.mydreamgirlfriend.ai/lp/female-card.webp" alt="Female AI companion" width="600" height="800" loading="eager">

        <div class="card-label">

      <!-- Male card -->
      <div class="card" role="button" tabindex="0" aria-label="Create a male AI companion" onclick="handleSelection('male')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleSelection('male')}">
        <div class="card-image male">
          <img src="https://r2.mydreamgirlfriend.ai/lp/male-card.webp" alt="Male AI companion" width="600" height="800" loading="eager">
        </div>

          <h2>Male</h2>

        </div>
      </div>
    </div>

  <script>
    function getUrlParams() {
      var params = {};
      var searchParams = new URLSearchParams(window.location.search);
      searchParams.forEach(function(value, key) {
        params[key] = value;
      });
      return params;
    }

    function handleSelection(type) {
      // Show loading overlay
      document.getElementById('loadingOverlay').classList.add('active');

      // Generate event ID for dedup between pixel + CAPI
      var eventID = 'lead_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

      // Fire Meta Pixel Lead event with eventID
      if (typeof fbq === 'function') {
        fbq('track', 'Lead', { content_name: 'companion_type_selection', content_category: type, source: 'lp1' }, { eventID: eventID });
      }

      // Fire server-side CAPI Lead event (fire-and-forget)
      fetch('/api/meta/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: type, event_id: eventID, source_url: window.location.href }),
      }).catch(function() {});

      // Fire PostHog event
      if (typeof posthog !== 'undefined' && posthog.capture) {
        posthog.capture('lp_card_click', { type: type });
      }

      // Build redirect URL with all params preserved
      var params = getUrlParams();
      params.type = type;
      params.lp = 'lp1';

      var redirectUrl = 'https://app.mydreamgirlfriend.ai/build?' + new URLSearchParams(params).toString();

      // Short delay to let pixels fire before redirect
      setTimeout(function() {
        window.location.href = redirectUrl;
      }, 300);
    }
  </script>
