      // Fire TikTok Pixel only for TikTok-sourced traffic.
      if (track.tiktok && typeof ttq !== 'undefined' && ttq.track) {
        ttq.track('SubmitForm', { content_name: 'girl_card_click', content_category: slug, source: 'lp5' });
      }

      // PostHog fires for every visitor — universal analytics.
      if (typeof posthog !== 'undefined' && posthog.capture) {
        posthog.capture('lp_card_click', { slug: slug, lp: 'lp5' });
      }

      // Deep-link into the anonymous chat preview for this girl. A significant
      // action there fires the signup gate. All inbound ad params (utm_*, fbclid,
      // ttclid, exotracker, zone, country, device, ref) ride along for attribution.
      var params = getUrlParams();
      params.lp = 'lp5';
      var redirectUrl = APP_BASE + '/preview/girl/' + encodeURIComponent(slug) + '?' + new URLSearchParams(params).toString();

      setTimeout(function () { window.location.href = redirectUrl; }, 300);
    }

    // Load the live premade roster, then render. Unauthenticated → premade only.
    (function init() {
      fetch(APP_BASE + '/api/girlfriends')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          var girls = (d && d.girlfriends) ? d.girlfriends : [];
          // Premade only (defensive — the unauth API already excludes customs),
          // ordered by the API's sort_order.
          ALL_GIRLS = girls.filter(function (g) { return !g.is_custom; });
          if (!ALL_GIRLS.length) {
            var status = document.getElementById('status');
            status.textContent = 'No girls available right now. Try again soon.';
            return;
          }
          applyFilters();
        })
        .catch(function () {
          document.getElementById('status').textContent = 'Could not load girls. Please refresh.';
        });

      document.getElementById('hairFilter').addEventListener('change', applyFilters);
      document.getElementById('ethnicityFilter').addEventListener('change', applyFilters);
      document.getElementById('searchInput').addEventListener('input', applyFilters);

      // Delegated card clicks — avoids inline-onclick quoting issues with names.
      document.getElementById('grid').addEventListener('click', function (e) {
        var card = e.target.closest ? e.target.closest('.card') : null;
        if (!card) return;
        goToGirl(card.getAttribute('data-slug'), card.getAttribute('data-name'));
      });
    })();
  </script>
</body>
</html>
